<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DeepSeek KMS &mdash; Dashboard APBN 2026</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://unpkg.com/vis-network@9.1.9/standalone/umd/vis-network.min.js"></script>
</head>
<body>
  <header>
    <h1>DeepSeek KMS</h1>
    <span class="subtitle">Analisis Koherensi &amp; Keselarasan APBN 2026 (DIPA vs RPJMN/RKP)</span>
  </header>

  <nav class="tabs">
    <button class="tab active" data-tab="overview">Ringkasan</button>
    <button class="tab" data-tab="graph">Knowledge Graph</button>
    <button class="tab" data-tab="anomalies">Anomali Keselarasan</button>
    <button class="tab" data-tab="coherence">Anomali Koherensi</button>
    <button class="tab" data-tab="kl">Penugasan K/L</button>
  </nav>

  <main>
    <!-- OVERVIEW -->
    <section id="overview" class="panel active">
      <div id="kpi-cards" class="kpi-grid"></div>
      <div class="grid2">
        <div class="card"><h3>Tipe Anomali Keselarasan</h3><div id="tbl-anomaly-types"></div></div>
        <div class="card"><h3>Verdict TreasurAI</h3><div id="tbl-verdicts"></div></div>
        <div class="card"><h3>Anomali Koherensi (Jenis Komponen)</h3><div id="tbl-coherence-sum"></div></div>
        <div class="card"><h3>Simpul Knowledge Graph</h3><div id="tbl-nodes"></div></div>
      </div>
    </section>

    <!-- GRAPH -->
    <section id="graph" class="panel">
      <div class="toolbar">
        <label>Dokumen:
          <select id="g-source">
            <option value="RPJMN">RPJMN 2025-2029</option>
            <option value="RKP_2026">RKP 2026</option>
          </select>
        </label>
        <label>Prefix PN (mis. 01):
          <input id="g-pn" type="text" placeholder="kosong = semua" size="8" />
        </label>
        <label><input id="g-kp" type="checkbox" /> Sertakan KP</label>
        <button id="g-load">Muat Graph</button>
        <span id="g-info" class="muted"></span>
      </div>
      <div id="network"></div>
    </section>

    <!-- ANOMALIES -->
    <section id="anomalies" class="panel">
      <div class="toolbar">
        <label>K/L: <select id="a-kl"><option value="">Semua</option></select></label>
        <label>Verdict:
          <select id="a-verdict">
            <option value="">Semua</option>
            <option value="valid">valid</option>
            <option value="false_positive">false_positive</option>
            <option value="manual_review">manual_review</option>
          </select>
        </label>
        <label>Status:
          <select id="a-status">
            <option value="">Semua</option>
            <option value="confirmed">confirmed</option>
            <option value="dismissed">dismissed</option>
            <option value="needs_review">needs_review</option>
            <option value="pending">pending</option>
          </select>
        </label>
        <label>Min prioritas: <input id="a-prio" type="number" value="0" step="5" size="5" /></label>
        <button id="a-load">Terapkan</button>
        <button id="a-export" class="ghost">Export CSV</button>
        <span id="a-info" class="muted"></span>
      </div>
      <div id="tbl-anomalies" class="tablewrap"></div>
    </section>

    <!-- COHERENCE -->
    <section id="coherence" class="panel">
      <div class="toolbar">
        <label>K/L: <select id="c-kl"><option value="">Semua</option></select></label>
        <label>Jenis anomali:
          <select id="c-jenis">
            <option value="">Semua</option>
            <option value="pendukung_dominan">pendukung_dominan</option>
            <option value="utama_kecil">utama_kecil</option>
          </select>
        </label>
        <button id="c-load">Terapkan</button>
        <button id="c-export" class="ghost">Export CSV</button>
        <span id="c-info" class="muted"></span>
      </div>
      <div id="tbl-coherence" class="tablewrap"></div>
    </section>

    <!-- KL -->
    <section id="kl" class="panel">
      <div class="toolbar">
        <label>K/L: <select id="k-kl"><option value="">Semua</option></select></label>
        <button id="k-load">Terapkan</button>
        <button id="k-export" class="ghost">Export CSV</button>
        <span id="k-info" class="muted"></span>
      </div>
      <div id="tbl-kl" class="tablewrap"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
